name: TypeScript Build & Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install dependencies
      run: npm install

    - name: TypeScript compile
      run: npm run build

    - name: Run tests
      run: npm test

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist-build
        path: dist/
