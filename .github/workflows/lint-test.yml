name: Lint and Test

on:
  pull_request:
    branches: ["dev", "main"]
  workflow_dispatch: {}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run test
